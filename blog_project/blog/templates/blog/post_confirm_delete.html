<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h2>Czy na pewno usunąć?</h2>

    <form method="post">

        <a href="{% url 'blog:post_detail' object.pk %}">Anuluj</a>
    </form>

</body>
</html>
